<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="assets/KK.svg">
<title data-k="pd_title">Project Details — Kevin Kamau</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="styles.css">
</head>
<body class="t-primary">

<div class="grid-bg"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">KK.DEV</a>
  <a href="index.html#projects" class="nav-back" data-k="pd_nav_back">Back to Projects</a>
  <div class="controls">
    <div class="lang-sw">
      <button id="btn-en" class="active" onclick="setLang('en')">EN</button>
      <button id="btn-ar" onclick="setLang('ar')">عر</button>
    </div>
    <div class="theme-pill" onclick="toggleTheme()">
      <span data-k="theme_lbl">Theme</span>
      <div class="theme-dot"></div>
    </div>
    <button id="nav-toggle" class="nav-mobile-btn" aria-label="Toggle Menu" onclick="document.getElementById('mobile-menu').classList.toggle('open'); document.getElementById('nav-toggle').classList.toggle('active');">
      <span></span><span></span>
    </button>
  </div>
</nav>

<!-- MOBILE MENU OVERLAY -->
<div id="mobile-menu">
  <div class="mm-content">
    <button class="mm-close-btn" onclick="closeMobileMenu()" aria-label="Close Menu">✕</button>
    <ul class="mm-links">
      <li><a href="index.html" onclick="closeMobileMenu()">HOME</a></li>
    </ul>
    <div class="mm-footer">
      <span class="pb-pulse-dot"></span>
      <span>SYSTEM_READY</span>
    </div>
  </div>
</div>

<!-- BACK TO PROJECTS BUTTON -->
<div class="pd-back-btn-wrapper">
  <a href="index.html#projects" class="pd-back-btn" data-k="pd_nav_back">← Back to Projects</a>
</div>

<!-- PROJECT TABS — populated by project-details.js from data/projects.json -->
<div class="pd-selector"></div>


<!-- LIGHTBOX -->
<div id="lightbox" aria-hidden="true">
  <div id="lightbox-content">
    <div class="lightbox-inner">
      <div class="lightbox-icon"><i class="fa-solid fa-image" aria-hidden="true"></i></div>
      <div id="lightbox-title" class="lightbox-title"></div>
      <div class="lightbox-hint">Add your screenshot here by replacing<br>this placeholder with an &lt;img&gt; tag</div>
    </div>
    <button id="lightbox-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark" aria-hidden="true"></i> <span data-k="pd_lightbox_close">Close</span></button>
  </div>
</div>

<!-- FOOTER -->
<footer class="pd-footer">
  <span class="f-copy">© <span id="current-year"></span> Kevin Kamau — All rights reserved</span>
  <div class="footer-meta">
    <span class="f-copy">Built with precision</span>
    <span class="f-dot"></span>
  </div>
</footer>

<script src="script/translations.js"></script>
<script src="script/ui-core.js"></script>
<script src="script/project-details.js"></script>

</body>
</html>
